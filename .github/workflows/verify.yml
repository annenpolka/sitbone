name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint And Test
    runs-on: macos-15
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Swift Version
        run: swift --version

      - name: Show SwiftLint Version
        run: swiftlint version

      - name: Lint
        run: make lint

      - name: Unit Tests
        run: make test-unit

      - name: Upload Verify Logs
        if: success() || failure()
        uses: actions/upload-artifact@v6
        with:
          name: verify-logs
          path: .build/logs/
          if-no-files-found: ignore
